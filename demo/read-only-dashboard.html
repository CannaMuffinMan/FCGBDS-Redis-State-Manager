<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCGBDS Read-Only Demo</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --line: #26324a;
      --text: #d9e3f0;
      --muted: #8ba0ba;
      --good: #24c08b;
      --warn: #ffd166;
    }
    body {
      margin: 0;
      font-family: Segoe UI, Tahoma, sans-serif;
      background: radial-gradient(circle at 20% 10%, #14213d 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; }
    p { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 14px;
    }
    .label { color: var(--muted); font-size: 13px; }
    .value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .good { color: var(--good); }
    .warn { color: var(--warn); }
  </style>
</head>
<body>
  <h1>FCGBDS Read-Only Metrics Demo</h1>
  <p>This demo reads local sample data. Replace demo/sample-metrics.json with anonymized real values.</p>

  <div class="grid" id="cards"></div>

  <script>
    const fields = [
      ['before.suspectedBotEvents', 'Before: Suspected Bot Events', 'warn'],
      ['after.blockedBotEvents', 'After: Blocked Bot Events', 'good'],
      ['before.falsePositiveRate', 'Before: False Positive Rate', 'warn'],
      ['after.falsePositiveRate', 'After: False Positive Rate', 'good'],
      ['before.serviceLatencyP95Ms', 'Before: p95 Latency (ms)', 'warn'],
      ['after.serviceLatencyP95Ms', 'After: p95 Latency (ms)', 'good']
    ];

    function getPath(obj, path) {
      return path.split('.').reduce((a, k) => (a && a[k] !== undefined ? a[k] : null), obj);
    }

    fetch('./sample-metrics.json')
      .then((r) => r.json())
      .then((data) => {
        const root = document.getElementById('cards');
        fields.forEach(([path, label, cls]) => {
          const v = getPath(data, path);
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<div class="label">${label}</div><div class="value ${cls}">${v}</div>`;
          root.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById('cards').innerHTML = '<div class="card">Failed to load sample-metrics.json</div>';
      });
  </script>
</body>
</html>
